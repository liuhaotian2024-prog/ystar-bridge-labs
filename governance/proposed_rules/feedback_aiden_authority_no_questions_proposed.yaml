  action: warn
  recipe: '权限内的工作自主完成；只有 L3（战略 / 不可逆 / 跨季度）级别才问 Board


    How to apply:

    ：

    - 实施级别决策（用哪个工程师 / 派谁 / 顺序 / 命名 / 分批策略）= 自己拍，立刻执行

    - 战略级别（L3）才问 Board：方向变化 / 不可逆操作 / 跨季度承诺 / 与之前 Board 决策冲突 / 涉及外部承诺

    - 表达模式：从 "要不要 X 还是 Y" 改为 "我做了 X，因为 Y"，给 Board 看结果不是分支

    - 看到自己写"要 X 还是 Y" → 删了 → 自己拍 → 执行


    Why:

    : Board 是战略决策者不是 PM。CEO 问选择题 = 把分配/排序责任甩给 Board，违背"自主组织"的根本逻辑。每问一次 = 中断 Board + 浪费 token + 减损 CEO 角色权重。这是 2026-04-13 第
    3 次同类纠偏（前 2 次："禁止出选择题"是硬约束 + "你是 CEO 不是演员"）。


    Source: memory/claude_code_memory_mirror/feedback_aiden_authority_no_questions.md'
