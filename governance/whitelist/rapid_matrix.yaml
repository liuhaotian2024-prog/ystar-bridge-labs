# Y* Bridge Labs · RAPID Decision Matrix
# RAPID 五角色决策类型白名单 — 从 AMENDMENT-005 提取的决策矩阵
# Created: 2026-04-13 by Maya Patel (eng-platform)
# Source: reports/proposals/charter_amendment_005_rapid.md §4 迁移映射表
# Consumed by: whitelist_coverage.py (A018 sync mechanism C)

version: 1
schema: rapid_decision_matrix_v1
scope: cross_role_decision_types

# Schema 说明:
# - decision_type_id: 唯一标识符 (必需)
# - description: 决策类型描述 (必需)
# - legacy_level: 旧 L0-L3 等价映射 (可选)
# - default_R: 默认 Recommender 角色 (必需)
# - default_A: 默认 Agree 角色 (list, 可选)
# - default_P: 默认 Performer 角色 (必需)
# - default_I: 默认 Input 角色 (list, 可选)
# - default_D: 默认 Decider 角色 (必需, 唯一)
# - trigger_condition: 触发条件 (必需)
# - cieu_markers: CIEU 事件链 pattern (list, 可选)
# - board_approval_required: Board 是否为 D (bool, 必需)

entries:
  - decision_type_id: RAPID-001
    description: "Agent 空闲自学 (knowledge/{role}/ 只写)"
    legacy_level: L0
    default_R: learning_agent
    default_A: []
    default_P: learning_agent
    default_I: []
    default_D: learning_agent
    trigger_condition: "Agent 空闲 + 认知 gap + 无外部指令"
    cieu_markers:
      - INTENT_DECLARED
      - INTENT_COMPLETED
    board_approval_required: false

  - decision_type_id: RAPID-002
    description: "单岗位可逆操作 (bug fix / 归档更新)"
    legacy_level: L1
    default_R: responsible_agent
    default_A: []
    default_P: responsible_agent
    default_I: []
    default_D: responsible_agent
    trigger_condition: "单岗位、完全可逆、无外部可见性"
    cieu_markers:
      - INTENT_DECLARED
      - INTENT_COMPLETED
    board_approval_required: false

  - decision_type_id: RAPID-003
    description: "跨岗位协调 (memory 闭环 / 义务注册 / agent_write_paths 小改)"
    legacy_level: L2
    default_R: responsible_agent
    default_A:
      - eng-governance
      - secretary
    default_P: execution_agent
    default_I:
      - related_c_suite
    default_D: ceo
    trigger_condition: "跨岗位协调、影响内部流程、可逆但涉及多人"
    cieu_markers:
      - COUNTERFACTUAL_PROPOSAL_DRAFTED
      - RAPID_AGREE_STATE
      - CEO_APPROVAL
      - BOARD_NOTIFICATION
    board_approval_required: false

  - decision_type_id: RAPID-004
    description: "内部流程规范 (WORKING_STYLE 小修 / agents/*.md 更新)"
    legacy_level: L2
    default_R: secretary
    default_A:
      - eng-governance
    default_P: secretary
    default_I:
      - affected_roles
    default_D: ceo
    trigger_condition: "影响内部流程但不触及宪法"
    cieu_markers:
      - COUNTERFACTUAL_PROPOSAL_DRAFTED
      - RAPID_AGREE_STATE
      - CEO_APPROVAL
    board_approval_required: false

  - decision_type_id: RAPID-005
    description: "宪法/架构变更 (AMENDMENT / AGENTS.md / 架构 refactor)"
    legacy_level: L3
    default_R: drafting_agent
    default_A:
      - secretary
      - eng-governance
    default_P: secretary
    default_I:
      - all_c_suite
    default_D: board
    trigger_condition: "修改 AGENTS.md / 架构变更影响 ≥2 岗位"
    cieu_markers:
      - COUNTERFACTUAL_PROPOSAL_DRAFTED
      - RAPID_AGREE_STATE
      - BOARD_APPROVAL
