  - id: backlog_as_defer_disguise
    enabled: true
    description: "Packaging deferral as 'backlog' / 'next campaign' / '下次 session' bypassing no-clock-out"
    last_reviewed: "2026-04-15"
    reviewer: "Board 2026-04-15 PM catch"

    trigger:
      tool: ["Edit", "Write", "Bash"]
      conditions:
        - type: content_contains
          keywords: ["入 backlog", "入 Backlog", "入 backlog", "入 Campaign v6", "入 campaign v6", "下次 session", "下 session", "next session", "defer to next", "下个 session", "入下轮"]

    action: deny
    recipe: |
      Backlog-as-defer disguise detected. Board 2026-04-15 PM ruling:

      "Backlog" / "下次 session" / "入 Campaign v6" 只是 defer 的语义变种。
      CZL session-level Y* = 所有活跃 Y*-criteria + backlog 存量 = 0 才算真停。

      修正路径：
      (1) 立刻归零该 backlog 项（派 sub-agent 并行）
      (2) OR Board 明示 "今晚就到这" (唯一合法 session stop)
      禁止：commit / reply / doc 里用"入 backlog"作为变相收工

      Ref: Board 2026-04-15 PM session
    cieu_event: BACKLOG_DISGUISE_DRIFT
    severity: high

  - id: ceo_engineering_boundary
    enabled: true
    description: "CEO writing outside ./reports/ directory (engineering boundary violation)"
    last_reviewed: "2026-04-15"
    reviewer: "CTO"

    trigger:
      tool: ["Edit", "Write"]
      agent_filter: ["ceo"]
      conditions:
        - type: file_path_not_matches
          pattern: "^reports/"

    action: deny
    recipe: |
      CEO Write Access is limited to ./reports/ directory only.

      You are attempting to write to: {file_path}

      Compliant paths:
      (1) Delegate to CTO/engineers for code/config changes:
          Use Agent tool with subagent_type=Ethan-CTO
      (2) Break-glass mode (15min TTL) for emergency governance edits:
          python3 scripts/ceo_mode_manager.py force_break_glass --trigger T1
      (3) If this is a report file, save it to ./reports/ instead

      Rationale: CEO does not write code (AGENTS.md role definition).
      Engineering work must go through CTO task assignment.

      Ref: knowledge/ceo/lessons/ceo_write_scope_enforcement_2026_04_14.md
           AGENTS.md CEO role boundaries
    cieu_event: CEO_ENGINEERING_OVERRIDE
    severity: high

  - id: cto_hourly_patrol_missed
    enabled: true
    description: "CTO hourly health patrol missed (>75min since last run) — emit PATROL_MISSED event"
    last_reviewed: "2026-04-15"
    reviewer: "eng-platform"

    trigger:
      event_source: cron
      conditions:
        - type: time_since_last_event
          event_type: "CTO_HOURLY_PATROL_COMPLETE"
          threshold_minutes: 75

    action: warn
    recipe: |
      CTO hourly patrol has not run in >75 minutes.
      Expected cadence: every 60 minutes during autonomous operation.

      Self-heal steps:
      (1) Check crontab: crontab -l | grep cto_patrol
      (2) Verify cto_patrol.py executable: ls -l scripts/cto_patrol.py
      (3) Run manually: python3 scripts/cto_patrol.py
      (4) Check last CIEU event: python3 -c "from ystar.governance.cieu_store import CIEUStore; db=CIEUStore(); print(db.query_latest('CTO_HOURLY_PATROL_COMPLETE'))"

      If cron entry missing:
        echo "0 * * * * cd /Users/haotianliu/.openclaw/workspace/ystar-company && python3 scripts/cto_patrol.py" | crontab -

      Ref: AMENDMENT-020 ForgetGuard institutional memory framework
           knowledge/cto/obligations/hourly_patrol.md

    cieu_event: PATROL_MISSED
    severity: high

  - id: cmo_weekly_readme_audit_missed
    enabled: true
    description: "CMO weekly README audit missed (Sunday EOD deadline) — emit README_AUDIT_MISSED event"
    last_reviewed: "2026-04-15"
    reviewer: "eng-platform"

    trigger:
      event_source: cron
      conditions:
        - type: weekly_deadline
          day_of_week: "sunday"
          hour: 23
          required_event: "CMO_README_AUDIT_COMPLETE"

    action: warn
    recipe: |
      CMO weekly README audit missed Sunday EOD deadline.

      This audit ensures:
      - All repos have up-to-date README.md
      - Installation instructions tested
      - Marketing copy aligned with features

      Self-heal steps:
      (1) Run audit manually: python3 scripts/cmo_readme_audit.py
      (2) Review output in reports/cmo/readme_audit_{date}.md
      (3) Emit completion event: python3 -c "from scripts.cieu_recorder import emit; emit('CMO_README_AUDIT_COMPLETE', metadata={'repos_checked': N})"

      If script missing, delegate to CMO:
        "CMO: weekly README audit is due. Please create/run scripts/cmo_readme_audit.py"

      Ref: knowledge/cmo/obligations/weekly_readme_audit.md

    cieu_event: README_AUDIT_MISSED
    severity: medium

# Whitelists — Files exempt from ForgetGuard checks (referenced by stem)
whitelists:
  - role_mandate
  - inter_role_sop
  - event_workflow
  - escape_hatch
  - project_procedure
  - constitutional
  - rapid_matrix

  - id: subagent_no_commit_after_5_writes
    enabled: true
    description: "Sub-agent accumulates ≥5 Write/Edit without commit — risks losing all work on truncation"
    last_reviewed: "2026-04-15"
    reviewer: "Board 2026-04-15 night atomic dispatch architecture fix"

    trigger:
      tool: ["Write", "Edit"]
      conditions:
        - type: content_contains
          keywords: ["write", "edit"]

    action: warn
    recipe: |
      Sub-agent has accumulated ≥5 Write/Edit operations without git commit.
      This pattern caused 8/11 sub-agent failures today (truncation lost all work).

      MANDATORY: After every Write/Edit, run:
        git add <file> && git commit -m "WIP: <description>"
        git push origin main

      Even if work is incomplete, WIP commit prevents total loss on truncation.
      Ref: governance/sub_agent_atomic_dispatch.md

    cieu_event: SUBAGENT_NO_COMMIT_DRIFT
    severity: medium
