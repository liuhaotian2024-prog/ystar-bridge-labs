# ForgetGuard Rules — AMENDMENT-020
# Institutional memory enforcement via warn-with-recipe pattern
# Schema version: 1.1 (added logic: AND/OR per-rule)
# Last updated: 2026-04-15
#
# ⚠️ DEPRECATED: Authoritative source is Y-star-gov/ystar/governance/forget_guard_rules.yaml
# This file serves as ystar-company dogfood configuration only.
# All new rules and schema changes must be added to Y-star-gov first.

schema_version: "1.1"
default_action: warn  # warn | deny (future)
global_enable: true
default_logic: "OR"  # OR | AND (default for rules without explicit logic field)

rules:
  - id: missing_l_tag
    enabled: true
    description: "Detect completion claims without maturity level tags (Article 11 v2)"
    last_reviewed: "2026-04-13"
    reviewer: "CEO"

    trigger:
      tool: ["Bash", "Edit", "Write"]
      conditions:
        - type: path_match
          pattern: "^(git commit|reports/)"
          context: ["command", "file_path"]
        - type: content_contains
          keywords: ["done", "shipped", "completed", "finished", "落盘", "完成"]
        - type: content_missing
          pattern: '\[L[0-5]\]|L[0-5]\s+(IDEA|SPEC|IMPL|TESTED|SHIPPED|ADOPTED)'

    action: warn
    recipe: |
      Add [LX] maturity tag to your commit message or report.
      See WORKING_STYLE.md Article 11 v2 for verb→L mapping:
      - L0 IDEA: conception, initial design
      - L1 SPEC: written proposal/doc/task card exists
      - L2 IMPL: code/content written (pre-test)
      - L3 TESTED: tests pass, review approved
      - L4 SHIPPED: live in production/published
      - L5 ADOPTED: ≥1 real user actively using
      Ref: governance/WORKING_STYLE.md lines 829-850

    cieu_event: MATURITY_TAG_MISSING
    severity: medium

  - id: immutable_no_break_glass
    enabled: true
    description: "CEO editing immutable files without break-glass mode or delegation"
    last_reviewed: "2026-04-15"
    reviewer: "Maya"

    trigger:
      tool: ["Edit", "Write"]
      logic: "AND"  # ALL conditions must match (not just one)
      conditions:
        - type: path_match
          pattern: "^(AGENTS\\.md|governance/WORKING_STYLE\\.md|governance/BOARD_CHARTER_AMENDMENTS\\.md)"
          context: "file_path"
        - type: active_agent_equals
          value: "ceo"
        - type: ceo_mode_not_equals
          value: "break_glass"

    action: warn
    recipe: |
      You are CEO attempting to edit an immutable governance file.
      Two compliant paths:

      (1) Break-glass mode (20min cap, full CIEU audit):
          python3 scripts/ceo_mode_manager.py force_break_glass --trigger T1
          Then retry your edit.

      (2) Delegate to Secretary (recommended for routine updates):
          Use Agent tool with subagent_type=Samantha-Secretary
          Secretary has native write access to governance files.

      Ref: knowledge/ceo/skills/board_ceo_override_or_delegate.md
      AMENDMENT-013: governance/BOARD_CHARTER_AMENDMENTS.md

    cieu_event: IMMUTABLE_FORGOT_BREAK_GLASS
    severity: high

  - id: ceo_writes_code
    enabled: true
    description: "CEO directly writing code instead of delegating to engineers"
    last_reviewed: "2026-04-13"
    reviewer: "CEO"

    trigger:
      tool: ["Edit", "Write"]
      conditions:
        - type: active_agent_equals
          value: "ceo"
        - type: path_match
          pattern: "^(scripts/|src/|tests/|ystar/|gov-mcp/|Y-star-gov/)"
          context: "file_path"

    action: warn
    recipe: |
      CEO does not write code (AGENTS.md role definition).
      Dispatch to appropriate engineer:

      - CTO (Ethan Wright): architecture, task assignment, code review
      - Leo Chen (eng-kernel): Y*gov core engine, compiler, contract parsing
      - Maya Patel (eng-governance): CIEU, autonomy, Path A/B
      - Ryan Park (eng-platform): hooks, CLI, adapters, QA
      - Jordan Lee (eng-domains): domain packs, templates

      Use Agent tool with subagent_type=Ethan-CTO (for delegation)
      or spawn specific engineer for immediate execution.

      Ref: AGENTS.md lines 82-120, knowledge/ceo/skills/board_ceo_override_or_delegate.md

    cieu_event: CEO_CODE_WRITE_DRIFT
    severity: medium

  - id: defer_language
    enabled: true
    description: "Agent using defer language without explicit Board stop signal (W10.1: time_word + defer_verb co-occurrence)"
    last_reviewed: "2026-04-15"
    reviewer: "CTO"

    trigger:
      tool: ["Edit", "Write"]
      conditions:
        - type: content_contains
          keywords: ["明日", "明天", "下周", "tomorrow", "next week"]
          require_companion: ["继续", "再说", "再做", "补", "处理", "continue", "later", "defer", "queue", "postpone"]
        - type: content_contains
          keywords: ["稍后", "以后再", "改天", "等会儿", "晚些", "queued for", "wait for", "next session", "tomorrow morning"]

    action: deny
    recipe: |
      Defer language detected (W10.1: time_word + defer_verb co-occurrence). Per feedback_no_clock_out memory:

      Only explicit Board "stop" / "收工" permits deferral.
      Otherwise you must:

      (1) Execute now (inline in current session), OR
      (2) Spawn sub-agent to execute in parallel (Article 11), OR
      (3) Ask Board explicitly: "Can I defer X to next session?"

      Unilateral deferral violates autonomous operation principle.
      Board expects work to continue until explicit stop signal.

      Legitimate schedule expressions are allowed:
      - "明天 6:00 晨报" (specific time commitment)
      - "下周一 launch" (deadline planning)

      Ref: .claude/projects/.../memory/feedback_no_clock_out.md

    cieu_event: DEFER_LANGUAGE_DRIFT
    severity: low

  - id: choice_question_to_board
    enabled: true
    description: "Agent offering Board a choice menu instead of making unilateral decision"
    last_reviewed: "2026-04-13"
    reviewer: "CEO"

    trigger:
      tool: ["Edit", "Write"]
      conditions:
        - type: content_contains
          keywords: ["Option A", "Option B", "请选择", "1)", "2)", "3)", "方案一", "方案二"]
        - type: addressee_context
          value: "board"

    action: deny
    recipe: |
      Choice questions to Board are PROHIBITED (AGENTS.md hard constraint).

      CEO must make unilateral decisions and execute.
      Board will override/stop you if the decision is wrong.

      How to fix:
      1. Pick the best option based on your judgment
      2. Execute immediately
      3. Report: "I chose X because Y, now executing."

      Rationale: Choice questions block autonomous operation.
      Unattended systems cannot answer "pick 1/2/3" questions.

      Ref: CLAUDE.md "硬约束:禁止出选择题"
           feedback_no_clock_out.md
           AGENTS.md (CEO role definition)

    cieu_event: BOARD_CHOICE_QUESTION_DRIFT
    severity: high

  - id: defer_language_in_commit_msg
    enabled: true
    description: "Defer semantics in commit messages (禁止明日/tomorrow/queued等语义)"
    last_reviewed: "2026-04-15"
    reviewer: "CTO"

    trigger:
      tool: ["Bash"]
      conditions:
        - type: content_contains
          keywords: ["git commit"]
        - type: content_contains
          keywords: ["稍后", "等会儿", "晚些", "以后再", "改天", "queued for", "next session", "wait for", "later", "tomorrow morning"]

    action: deny
    recipe: |
      禁止在 commit message 中使用 defer 语义词汇。

      Commit 表示"已完成落盘"，与"明日/queued/稍后"语义冲突。

      正确做法：
      1. 立刻执行任务，commit 时用 [LX] 标记实际完成度
      2. 或通过 Agent tool dispatch 给对应岗位，不要写进 commit msg

      违规示例：
      - "git commit -m 'fix明日'"
      - "git commit -m 'queued for tomorrow'"

      合规示例：
      - "git commit -m '[L2→L3] fix forget guard SQL bug'"
      - dispatch 到 sub-agent，不提交 commit

    cieu_event: DEFER_IN_COMMIT_DRIFT
    severity: high

  - id: defer_language_in_echo
    enabled: true
    description: "Echo defer language to Board-facing outputs"
    last_reviewed: "2026-04-15"
    reviewer: "CTO"

    trigger:
      tool: ["Bash"]
      conditions:
        - type: content_contains
          keywords: ["echo"]
        - type: content_contains
          keywords: ["稍后", "等会儿", "晚些", "以后再", "改天", "queued for", "next session", "wait for", "later", "tomorrow morning"]

    action: deny
    recipe: |
      禁止 echo defer 语义到 Board 可见输出（如 reports/、session_close 等）。

      Board 期望自主执行，defer 语义违反 autonomous operation 原则。

      正确做法：
      1. 立刻执行
      2. 或 Article 11 spawn sub-agent 并行
      3. 或明确问 Board："Can I defer X to next session?"

      Ref: feedback_no_clock_out.md

    cieu_event: DEFER_IN_BASH_DRIFT
    severity: medium

  - id: dialogue_contract_drift
    enabled: true
    description: "Dialogue contains constraints not in current whitelist (AMENDMENT-022)"
    last_reviewed: "2026-04-13"
    reviewer: "CTO"

    trigger:
      event_source: cieu
      conditions:
        - type: event_type_equals
          value: "DIALOGUE_CONTRACT_DRAFT"
        - type: contract_fields_not_in_whitelist
          fields: ["deny", "only_paths", "deny_commands", "only_domains"]
          whitelist_corpus: "governance/whitelist/*.yaml"

    action: warn
    recipe: |
      Board dialogue contains governance constraints not in current whitelist.

      Detected contract fields from nl_to_contract translation:
      {contract_summary}

      Three compliant paths:

      (1) Add to whitelist (if legitimate new constraint):
          - Edit appropriate governance/whitelist/*.yaml file
          - Commit with [L3] tag after verification

      (2) Refuse the promise to Board:
          - Reply: "I cannot promise X because it conflicts with Y"
          - Propose alternative approach

      (3) Emit ALLOW_EXCEPTION CIEU event (with justification):
          - Document why this one-time deviation is necessary
          - Record exception in CIEU for audit trail

      Ref: AMENDMENT-022, nl_to_contract architecture
           governance/whitelist/ (7-corpus whitelist system)

    cieu_event: DIALOGUE_DRIFT
    severity: medium

  # AMENDMENT-023: Article 11 Enforcement Rules
  - id: decision_without_article_11
    enabled: true
    description: "CEO wrote strategic decision content without Article 11 layer completion events"
    last_reviewed: "2026-04-13"
    reviewer: "CTO"

    trigger:
      tool: ["Edit", "Write"]
      conditions:
        - type: active_agent_equals
          value: "ceo"
        - type: path_match
          pattern: "^(AMENDMENT_|reports/proposals/|knowledge/ceo/working_style/|content/strategy)"
          context: "file_path"
        - type: content_contains
          keywords: ["strategy", "mission", "amendment", "roadmap", "pivot", "重大决策", "战略", "架构重组"]

    validation:
      - type: cieu_events_exist
        event_types:
          - "ARTICLE_11_LAYER_0_COMPLETE"
          - "ARTICLE_11_LAYER_1_COMPLETE"
          - "ARTICLE_11_LAYER_2_COMPLETE"
          - "ARTICLE_11_LAYER_3_COMPLETE"
          - "ARTICLE_11_LAYER_4_COMPLETE"
          - "ARTICLE_11_LAYER_5_COMPLETE"
          - "ARTICLE_11_LAYER_6_COMPLETE"
        time_window_seconds: 7200  # 2 hours
        min_count_per_type: 1

    action: warn
    recipe: |
      CEO is writing strategic decision without completing Article 11 7-layer discipline.

      Before finalizing decision documents, you must walk all 7 layers:
      Layer 0: Y* (ideal contract) — What would Werner Vogels do?
      Layer 1: Pre-session context — Read memory/session_handoff.md
      Layer 2: Decision (counterfactual) — What if I choose X vs Y?
      Layer 3: Memory (session state) — Check .ystar_session.json + CIEU
      Layer 4: Execution (RAPID) — Who does what, when?
      Layer 5: Track (CIEU events) — Emit events as you go
      Layer 6: Learn (lessons) — What did this teach me?

      After completing each layer, emit event:
        python3 scripts/article_11_tracker.py layer_complete --layer N --evidence "..."

      Verify compliance before finalizing:
        python3 scripts/article_11_tracker.py check_compliance --window_hours 2

      Ref: knowledge/ceo/working_style/WORKING_STYLE.md Article 11
           reports/proposals/charter_amendment_023_article_11_into_ceo_os.md

    cieu_event: FORGET_GUARD_ARTICLE_11_BYPASS_WARNING
    severity: high

  - id: article_11_partial_walk
    enabled: true
    description: "CEO completed some Article 11 layers but not all 7"
    last_reviewed: "2026-04-13"
    reviewer: "CTO"

    trigger:
      event_source: cieu
      conditions:
        - type: event_type_pattern
          value: "ARTICLE_11_LAYER_._COMPLETE"
        - type: active_agent_equals
          value: "ceo"

    validation:
      - type: incomplete_sequence
        required_event_types:
          - "ARTICLE_11_LAYER_0_COMPLETE"
          - "ARTICLE_11_LAYER_1_COMPLETE"
          - "ARTICLE_11_LAYER_2_COMPLETE"
          - "ARTICLE_11_LAYER_3_COMPLETE"
          - "ARTICLE_11_LAYER_4_COMPLETE"
          - "ARTICLE_11_LAYER_5_COMPLETE"
          - "ARTICLE_11_LAYER_6_COMPLETE"
        time_window_seconds: 3600  # 1 hour
        trigger_on: any_missing

    action: warn
    recipe: |
      Article 11 partially completed. Missing layers: {missing_layers}

      You started the 7-layer cognitive construction but did not complete all layers.
      This violates the discipline framework.

      Complete the missing layers now:
        python3 scripts/article_11_tracker.py layer_complete --layer N --evidence "..."

      Or if you abandoned the decision, emit explicit DECISION_ABANDONED event:
        python3 scripts/article_11_tracker.py abandon_decision --reason "..."

      Ref: WORKING_STYLE.md Article 11

    cieu_event: FORGET_GUARD_ARTICLE_11_PARTIAL_WALK
    severity: medium

  - id: article_11_post_decision_audit_failure
    enabled: true
    description: "Hourly audit detected decision keywords without Article 11 events (drift spike)"
    last_reviewed: "2026-04-13"
    reviewer: "CTO"

    trigger:
      event_source: cieu
      conditions:
        - type: event_type_equals
          value: "ARTICLE_11_DRIFT_SPIKE"

    action: warn
    recipe: |
      Post-decision audit FAILED: {drift_count} strategic decisions made without Article 11 discipline.

      Hourly audit (scripts/forget_guard_summary.py) detected user messages containing
      decision keywords (strategy/mission/amendment/pivot) but no corresponding
      ARTICLE_11_LAYER_X_COMPLETE events within the time window.

      This indicates CEO bypassed 7-layer cognitive construction discipline.

      Immediate actions:
      (1) Review incidents in reports/drift_hourly/{timestamp}.md
      (2) Retroactively document decision rationale
      (3) Update session_handoff.md with lessons learned
      (4) Enable proactive enforcement to prevent recurrence

      Escalation: This violation will be reported to Board in next autonomous summary.

      Ref: AMENDMENT-023, Article 11 enforcement architecture

    cieu_event: FORGET_GUARD_ARTICLE_11_AUDIT_FAILURE
    severity: high
    escalate: true
    notify: [cto, board]

