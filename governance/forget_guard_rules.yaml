- id: session_age_concurrency_cap
  enabled: true
  description: 'Session-age-aware concurrency cap for CEO sub-agent spawns. Rationale: parent-session context accumulation
    over long sessions degrades stream I/O scheduling; concurrent long sub-agents exceed watchdog idle timeout when parent
    is busy consuming their streams. Empirical evidence: 2026-04-19 9h+ session, 4 concurrent spawns all hit stream-idle-timeout.'
  last_reviewed: '2026-04-19'
  reviewer: Board
  trigger:
    tool:
    - Agent
    logic: AND
    conditions:
    - type: active_agent_equals
      value: ceo
    - type: session_age_concurrency_exceeded
      caps:
      - session_age_hours_gt: 6
        max_concurrent: 2
      - session_age_hours_gt: 8
        max_concurrent: 1
  action: warn
  recipe: 'Session age exceeds threshold. Current concurrent sub-agents: {current_count}. Cap at your session_age: {cap}.
    Either (a) wait for in-flight to complete before spawning, (b) reduce scope of pending spawn to single-file + ≤8 tool_uses,
    (c) use Board-shell ops script path (no sub-agent spawn needed).'
  cieu_event: SESSION_AGE_CONCURRENCY_CAP_WARN
  severity: medium
  monitored_by: secretary
  authority: Board 2026-04-19 directive via consultant diagnosis
whitelists:
- role_mandate
- inter_role_sop
- event_workflow
- escape_hatch
- project_procedure
- constitutional
- rapid_matrix
- id: subagent_no_commit_after_5_writes
  enabled: true
  description: Sub-agent accumulates ≥5 Write/Edit without commit — risks losing all work on truncation
  last_reviewed: '2026-04-15'
  reviewer: Board 2026-04-15 night atomic dispatch architecture fix
  trigger:
    tool:
    - Write
    - Edit
    conditions:
    - type: content_contains
      keywords:
      - write
      - edit
  action: warn
  recipe: "Sub-agent has accumulated ≥5 Write/Edit operations without git commit.\nThis pattern caused 8/11 sub-agent failures\
    \ today (truncation lost all work).\n\nMANDATORY: After every Write/Edit, run:\n  git add <file> && git commit -m \"WIP:\
    \ <description>\"\n  git push origin main\n\nEven if work is incomplete, WIP commit prevents total loss on truncation.\n\
    Ref: governance/sub_agent_atomic_dispatch.md\n"
  cieu_event: SUBAGENT_NO_COMMIT_DRIFT
  severity: medium
- id: ceo_no_midstream_checkin
