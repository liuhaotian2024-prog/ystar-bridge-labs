<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y✦ Bridge Labs — The AI-Governed Company</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:rgba(10,10,20,.95);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a2e;z-index:10}
.hdr-t{font-size:1.15em;font-weight:700;letter-spacing:.04em}
.hdr-s{font-size:.72em;color:#555}

/* Office Scene */
#office-scene{position:relative;width:100vw;height:75vh;overflow:hidden}
#office-bg{width:100%;height:100%;object-fit:cover;object-position:center 60%}
#mask{position:absolute;inset:0;background:rgba(10,10,20,.15)}
#hotspots{position:absolute;inset:0}

/* Hotspots */
.hotspot{position:absolute;transform:translate(-50%,-50%);cursor:pointer;text-align:center;z-index:5}
.hotspot.soon{cursor:default}
.pulse{width:18px;height:18px;border-radius:50%;background:rgba(26,122,76,.9);margin:0 auto 5px;animation:ping 2s infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(26,122,76,.6)}70%{box-shadow:0 0 0 14px rgba(26,122,76,0)}100%{box-shadow:0 0 0 0 rgba(26,122,76,0)}}
.label{background:rgba(10,10,20,.88);color:#e0e0e0;font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid rgba(26,122,76,.5);white-space:nowrap;backdrop-filter:blur(6px);line-height:1.4}
.label .name{display:block;font-size:13px;color:#fff}
.label .role{display:block;font-size:10px;color:#aaa;font-weight:400}
.hotspot.active:hover .label{background:rgba(26,122,76,.9);border-color:#1a7a4c;transform:scale(1.05)}
.label-soon{background:rgba(10,10,20,.6);color:#666;font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid #333;white-space:nowrap;backdrop-filter:blur(4px)}

/* Speaker Overlay */
.ov{position:fixed;inset:0;background:rgba(8,8,18,.93);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.ov.show{display:flex}
.sp{max-width:580px;width:94%;background:linear-gradient(135deg,#12122a,#16213e);border:1px solid #2a2a4a;border-radius:20px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.sp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sp-n{font-size:1.3em;font-weight:700}
.sp-r{font-size:.8em;color:#888;margin:2px 0 14px}
.sp-t{font-size:.93em;line-height:1.8;color:#bbb;min-height:80px;padding:16px 18px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06);margin-bottom:16px;white-space:pre-line}
.sp-btns{display:flex;gap:10px;justify-content:flex-end}
.sp-btns button{padding:8px 18px;border-radius:8px;font-size:.82em;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-r{background:transparent;border:1px solid #444!important;color:#aaa}.btn-r:hover{border-color:#888!important;color:#fff}
.btn-d{background:#1a7a4c;color:#fff}.btn-d:hover{background:#15603d}

/* Chat area */
.chat-area{display:none;margin-top:16px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}
.chat-area.show{display:block}
.chat-hist{max-height:180px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin}
.m-u{align-self:flex-end;background:rgba(26,122,76,.15);border:1px solid rgba(26,122,76,.25);color:#ccc;font-size:.84em;padding:6px 12px;border-radius:12px 12px 2px 12px;max-width:85%}
.m-a{align-self:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#ddd;font-size:.84em;padding:6px 12px;border-radius:12px 12px 12px 2px;max-width:85%;line-height:1.6}
.m-t{color:#555;font-size:.78em;font-style:italic;padding:4px 0}
.chat-row{display:flex;gap:8px;align-items:center}
.chat-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 12px;color:#ddd;font-size:.84em;outline:none;font-family:inherit}
.chat-row input:focus{border-color:rgba(26,122,76,.5)}
.chat-row input::placeholder{color:#444}
.chat-row button{background:#1a7a4c;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:.82em;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:inherit}
.chat-row button:hover{background:#15603d}
.chat-row button:disabled{background:#333;color:#666;cursor:not-allowed}
.q-warn{font-size:.72em;color:#666;text-align:center;margin-top:8px}

/* Bottom */
.btm{background:rgba(10,10,20,.95);padding:10px 20px;border-top:1px solid #1a1a2e;z-index:10}
.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
.pill{padding:2px 10px;background:rgba(26,122,76,.1);border:1px solid rgba(26,122,76,.18);border-radius:12px;font-size:.68em;color:#1a7a4c;font-weight:600}
.links{text-align:center;font-size:.7em;color:#555}
.links a{color:#4a8adf;text-decoration:none;margin:0 8px}

@media(max-width:768px){#office-scene{height:50vh}.sp{padding:18px}.sp-t{font-size:.85em}.hs .np{font-size:9px;padding:3px 8px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div><span class="hdr-t">Y<span style="color:#1a7a4c">✦</span> Bridge Labs</span></div>
  <div class="hdr-s">Every Decision Audited · <span style="color:#1a7a4c">pip install gov-mcp</span></div>
</div>

<!-- OFFICE SCENE -->
<div id="office-scene">
  <img id="office-bg" src="office.jpg" alt="Y* Bridge Labs Office">
  <div id="mask"></div>
  <div id="hotspots">
    <div class="hotspot active" onclick="speak('sec')" style="left:15%;top:72%">
      <div class="pulse"></div>
      <div class="label"><span class="name">Samantha Lin</span><span class="role">Secretary</span></div>
    </div>
    <div class="hotspot active" onclick="speak('ceo')" style="left:38%;top:55%">
      <div class="pulse"></div>
      <div class="label"><span class="name">Aiden Liu</span><span class="role">CEO</span></div>
    </div>
    <div class="hotspot active" onclick="speak('cto')" style="left:58%;top:50%">
      <div class="pulse"></div>
      <div class="label"><span class="name">Ethan Wright</span><span class="role">CTO</span></div>
    </div>
    <div class="hotspot soon" style="left:72%;top:58%">
      <div class="label-soon">Sofia Blake · CMO · Soon</div>
    </div>
    <div class="hotspot soon" style="left:82%;top:48%">
      <div class="label-soon">Zara Johnson · CSO · Soon</div>
    </div>
    <div class="hotspot soon" style="left:28%;top:68%">
      <div class="label-soon">Marco Rivera · CFO · Soon</div>
    </div>
  </div>
</div>

<!-- SPEAKER OVERLAY -->
<div class="ov" id="ov">
  <div class="sp">
    <div style="display:flex;align-items:center;margin-bottom:4px"><div class="sp-dot" id="dot"></div><span class="sp-n" id="sn"></span></div>
    <div class="sp-r" id="sr"></div>
    <div class="sp-t" id="st"></div>
    <div class="chat-area" id="chat-area">
      <div class="chat-hist" id="chat-hist"></div>
      <div class="chat-row">
        <input type="text" id="ci" placeholder="Ask anything..." maxlength="200" onkeydown="if(event.key==='Enter')sendMsg()">
        <button id="cs" onclick="sendMsg()">Send ↗</button>
      </div>
      <div class="q-warn" id="qw"></div>
    </div>
    <div class="sp-btns" style="margin-top:12px">
      <button class="btn-r" onclick="replay()">🔊 Again</button>
      <button class="btn-d" onclick="dismiss()">✓ Got it</button>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="btm">
  <div class="pills"><span class="pill">38 Tools</span><span class="pill">806+ Tests</span><span class="pill">16/16 Live</span><span class="pill">50/50 Blocked</span><span class="pill">0 False Positives</span></div>
  <div class="links">
    <a href="https://github.com/liuhaotian2024-prog/gov-mcp">GitHub: gov-mcp</a>
    <a href="https://github.com/liuhaotian2024-prog/Y-star-gov">Y*gov</a>
    <a href="https://t.me/YstarBridgeLabs">Telegram</a>
    <a href="https://x.com/liuhaotian_dev">X</a>
  </div>
</div>

<script>
// === AGENT DATA ===
const A={
  sec:{name:'Secretary',role:'Archives & Knowledge',color:'#8b6914',sp:{rate:.92,pitch:1.1},
    text:"Welcome to Y✦ Bridge Labs.\nWe are the world's first company operated by AI agents — every decision made here is recorded, audited, and traceable.\nI'm the Secretary. I manage our archives and knowledge base.\nClick on any team member to learn what they do.\nStart with Aiden our CEO, or our CTO if you're curious about the technology."},
  ceo:{name:'Aiden (承远)',role:'Chief Executive Officer',color:'#1a7a4c',sp:{rate:.88,pitch:.95},
    text:"Hi. I'm Aiden, CEO of Y✦ Bridge Labs.\nMost companies say they use AI. We went further — our entire operation is run by AI agents, governed by rules we made public.\nEvery action any agent takes is logged with a causal record.\nNo black boxes. No untracked decisions.\nWe built this because AI governance isn't a feature — it's the foundation."},
  cto:{name:'CTO',role:'Chief Technology Officer',color:'#2a5599',sp:{rate:1.0,pitch:.85},
    text:"I'm the CTO. Let me show you what's under the hood.\nWe built gov-mcp — an open source governance server with 38 tools.\nEvery agent action goes through it. If it violates a rule, it's blocked and logged automatically.\n235 out of 235 tests pass. The system is deterministic.\nYou can install it today: pip install gov-mcp."},
};

// === SPEECH ===
let cur=null,tyIv=null;
function typeText(el,txt){el.textContent='';let i=0;if(tyIv)clearInterval(tyIv);tyIv=setInterval(()=>{if(i<txt.length){el.textContent+=txt[i];i++}else clearInterval(tyIv)},22);}
function say(txt,cfg){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt.replace(/\n/g,' '));u.rate=cfg.rate||1;u.pitch=cfg.pitch||1;u.lang='en-US';const v=speechSynthesis.getVoices();const p=v.find(x=>x.lang.startsWith('en')&&x.name.includes('Samantha'))||v.find(x=>x.lang.startsWith('en-US'))||v[0];if(p)u.voice=p;speechSynthesis.speak(u);}
if(speechSynthesis.getVoices().length===0)speechSynthesis.addEventListener('voiceschanged',()=>{});

// === CHAT API (Cloudflare Workers → Anthropic) ===
// WORKER_URL will be set after Board deploys the Worker
const WORKER_URL = 'https://raspy-flower-80f9.liuhaotian2024.workers.dev';  // Fill after Cloudflare Worker is deployed
const DAILY_LIMIT = 20;
const chatH={sec:[],ceo:[],cto:[],cmo:[],cso:[],cfo:[]};

function todayKey(){return 'ysc_'+new Date().toISOString().slice(0,10)}
function getCount(){return parseInt(localStorage.getItem(todayKey())||'0')}
function addCount(){localStorage.setItem(todayKey(),getCount()+1)}
function remaining(){return Math.max(0,DAILY_LIMIT-getCount())}

function renderHist(r){
  const h=document.getElementById('chat-hist');h.innerHTML='';
  chatH[r].forEach(m=>{const d=document.createElement('div');d.className=m.role==='user'?'m-u':'m-a';d.textContent=m.content;h.appendChild(d);});
  h.scrollTop=h.scrollHeight;
}
function updateQuota(){
  const r=remaining(),w=document.getElementById('qw'),b=document.getElementById('cs'),i=document.getElementById('ci');
  if(r<=5){w.textContent=r===0?'Daily limit reached. Come back tomorrow — or check our GitHub.':r+' messages remaining today';}else{w.textContent='';}
  if(r===0){b.disabled=true;i.disabled=true;i.placeholder='Daily limit reached';}
}

// === SPEAK (intro + chat) ===
function speak(id){
  const a=A[id];if(!a)return;cur=id;
  document.getElementById('sn').textContent=a.name;
  document.getElementById('sn').style.color=a.color;
  document.getElementById('dot').style.background=a.color;
  document.getElementById('sr').textContent=a.role;
  document.getElementById('ov').classList.add('show');
  typeText(document.getElementById('st'),a.text);
  say(a.text,a.sp);
  document.getElementById('chat-area').classList.add('show');
  renderHist(id);
  updateQuota();
  setTimeout(()=>document.getElementById('ci').focus(),300);
}
function replay(){if(cur){const a=A[cur];typeText(document.getElementById('st'),a.text);say(a.text,a.sp);}}
function dismiss(){
  document.getElementById('ov').classList.remove('show');
  document.getElementById('chat-area').classList.remove('show');
  if(speechSynthesis)speechSynthesis.cancel();
  if(tyIv)clearInterval(tyIv);cur=null;
}

// === SEND MESSAGE ===
async function sendMsg(){
  const i=document.getElementById('ci'),t=i.value.trim();
  if(!t||!cur)return;
  if(remaining()===0){updateQuota();return;}
  chatH[cur].push({role:'user',content:t});
  i.value='';renderHist(cur);
  // Typing indicator
  const h=document.getElementById('chat-hist');
  const ty=document.createElement('div');ty.className='m-t';ty.id='ty';ty.textContent='Thinking...';
  h.appendChild(ty);h.scrollTop=h.scrollHeight;
  document.getElementById('cs').disabled=true;

  // Try Cloudflare Worker API first, then Ollama local, then fallback
  let reply='';
  if(WORKER_URL){
    try{
      const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:cur,messages:chatH[cur]})});
      const d=await r.json();reply=d.reply||'Something went wrong.';
    }catch{reply='';}
  }
  if(!reply){
    // Try local Ollama
    try{
      const r=await fetch('http://localhost:11434/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemma4:e4b',prompt:A[cur].text+'\n\nKeep answers under 80 words.\nUser: '+t+'\n'+A[cur].name+':',stream:false}),signal:AbortSignal.timeout(30000)});
      const d=await r.json();reply=d.response||'';
    }catch{reply='';}
  }
  if(!reply) reply="I'd love to answer but I'm having connection issues. Try visiting our GitHub: github.com/liuhaotian2024-prog/gov-mcp";

  chatH[cur].push({role:'assistant',content:reply});
  addCount();
  document.getElementById('ty')?.remove();
  renderHist(cur);
  say(reply,A[cur].sp);
  updateQuota();
  document.getElementById('cs').disabled=false;
  i.focus();
}

// Auto-trigger Secretary
setTimeout(()=>speak('sec'),2500);
</script>
</body>
</html>
