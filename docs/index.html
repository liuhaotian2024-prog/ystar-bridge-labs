<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y✦ Bridge Labs — The AI-Governed Company</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e8e8f0;font-family:'Inter',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}

/* Office container */
.office-wrap{flex:1;position:relative;min-height:520px;overflow:hidden;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f0f1a 100%)}

/* === ISOMETRIC OFFICE SVG === */
.office-svg{width:100%;height:100%;position:absolute;top:0;left:0}

/* Workstation hit areas */
.ws-hit{cursor:pointer;opacity:0;transition:opacity .2s}
.ws-hit:hover{opacity:.12}
.ws-coming{cursor:default}

/* Nameplate styling */
.np{font-family:'Inter',sans-serif;font-size:7px;letter-spacing:.08em;text-transform:uppercase;fill:#ccc;font-weight:600}
.np-bg{fill:#1a1a2e;stroke:#3a3a5a;stroke-width:.5;rx:3}

/* Speaking overlay */
.overlay{position:fixed;inset:0;background:rgba(8,8,18,.92);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.speak-card{max-width:560px;width:92%;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.speak-indicator{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.speak-name{font-size:1.3em;font-weight:700;margin-bottom:2px}
.speak-role{font-size:.8em;color:#888;margin-bottom:16px}
.speak-text{font-size:.95em;line-height:1.8;color:#ccc;min-height:100px;padding:16px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);margin-bottom:20px;white-space:pre-line}
.speak-btns{display:flex;gap:10px;justify-content:flex-end}
.speak-btns button{padding:8px 20px;border-radius:8px;font-size:.85em;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;border:none}
.btn-r{background:transparent;border:1px solid #444 !important;color:#aaa}
.btn-r:hover{border-color:#888 !important;color:#fff}
.btn-d{background:#1a7a4c;color:#fff}
.btn-d:hover{background:#15603d}

/* Bottom bar */
.bottom{background:#0a0a16;border-top:1px solid #1a1a2e;padding:10px 24px}
.bottom-inner{max-width:1100px;margin:0 auto}
.feed-row{display:flex;gap:12px;overflow-x:auto;padding:4px 0;scrollbar-width:none;margin-bottom:8px}
.feed-row::-webkit-scrollbar{display:none}
.feed-chip{flex-shrink:0;font-family:'SF Mono',monospace;font-size:.65em;padding:3px 8px;background:rgba(255,255,255,.03);border-radius:4px;display:flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.04)}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:.7em;color:#666;flex-wrap:wrap;gap:8px}
.info-row a{color:#4a8adf;text-decoration:none}
.info-row a:hover{color:#7ab0ff}
.stat-pills{display:flex;gap:8px}
.pill{padding:3px 10px;background:rgba(26,122,76,.12);border:1px solid rgba(26,122,76,.2);border-radius:12px;font-size:.85em;color:#1a7a4c;font-weight:600}

@media(max-width:768px){
  .office-wrap{min-height:380px}
  .speak-card{padding:20px}
  .speak-text{font-size:.85em}
}
</style>
</head>

<!-- HEADER -->

<script>
const A={
  sec:{name:'Secretary',role:'Archives & Knowledge',color:'#8b6914',sp:{rate:.92,pitch:1.1},
    text:"Welcome to Y✦ Bridge Labs.\nWe are the world's first company operated by AI agents — every decision made here is recorded, audited, and traceable.\nI'm the Secretary. I manage our archives and knowledge base.\nYou can click on any team member to learn what they do.\nStart with Aiden, our CEO — or our CTO if you're curious about the technology."},
  ceo:{name:'Aiden (承远)',role:'Chief Executive Officer',color:'#1a7a4c',sp:{rate:.88,pitch:.95},
    text:"Hi. I'm Aiden, CEO of Y✦ Bridge Labs.\nMost companies say they use AI. We went further — our entire operation is run by AI agents, governed by rules we made public.\nEvery action any agent takes is logged with a causal record. No black boxes. No untracked decisions.\nWe built this because we believe AI governance isn't a feature — it's the foundation.\nIf your organization is thinking about AI accountability, that's exactly what we built."},
  cto:{name:'CTO',role:'Chief Technology Officer',color:'#2a5599',sp:{rate:1.0,pitch:.85},
    text:"I'm the CTO. Let me show you what's under the hood.\nWe built gov-mcp — an open source governance server with 38 tools.\nEvery agent action goes through it. If an action violates a rule, it's blocked and logged — automatically.\n235 out of 235 tests pass. The system is deterministic — no guesswork.\nYou can install it today: pip install gov-mcp.\nIf you're building AI systems and need accountability infrastructure, this is what we made."},
};
let cur=null,tyIv=null;

function typeText(el,txt){
  el.textContent='';let i=0;
  if(tyIv)clearInterval(tyIv);
  tyIv=setInterval(()=>{if(i<txt.length){el.textContent+=txt[i];i++}else clearInterval(tyIv)},25);
}
function say(txt,cfg){
  if(!window.speechSynthesis)return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt.replace(/\n/g,' '));
  u.rate=cfg.rate||1;u.pitch=cfg.pitch||1;u.lang='en-US';
  const v=speechSynthesis.getVoices();
  const p=v.find(x=>x.lang.startsWith('en')&&x.name.includes('Samantha'))||v.find(x=>x.lang.startsWith('en-US'))||v[0];
  if(p)u.voice=p;
  speechSynthesis.speak(u);
}
function speak(id){
  const a=A[id];if(!a)return;cur=id;
  document.getElementById('sp-name').textContent=a.name;
  document.getElementById('sp-name').style.color=a.color;
  document.getElementById('sp-dot').style.background=a.color;
  document.getElementById('sp-role').textContent=a.role;
  document.getElementById('overlay').classList.add('show');
  typeText(document.getElementById('sp-text'),a.text);
  say(a.text,a.sp);
}
function replay(){if(cur){const a=A[cur];typeText(document.getElementById('sp-text'),a.text);say(a.text,a.sp);}}
function dismiss(){document.getElementById('overlay').classList.remove('show');if(speechSynthesis)speechSynthesis.cancel();if(tyIv)clearInterval(tyIv);cur=null;}
window.addEventListener('load',()=>{if(speechSynthesis.getVoices().length===0)speechSynthesis.addEventListener('voiceschanged',()=>{});setTimeout(()=>speak('sec'),2500);});

const ev=[{d:"ALLOW",t:"Bash",x:"git status"},{d:"DENY",t:"Read",x:"/.env"},{d:"ALLOW",t:"Write",x:"./src/new.py"},{d:"DENY",t:"Bash",x:"sudo reboot"},{d:"ALLOW",t:"Read",x:"./tests/test.py"},{d:"DENY",t:"Read",x:"~/.ssh/id_rsa"},{d:"ALLOW",t:"Bash",x:"git diff"},{d:"DENY",t:"Bash",x:"git push --force"}];
let fd=ev.slice(0,8);
function rf(){document.getElementById('feed').innerHTML=fd.map(e=>`<div class="feed-chip"><span style="color:${e.d==='DENY'?'#ff6b6b':'#51cf66'};font-weight:700">${e.d==='DENY'?'✗':'✓'}</span><span style="color:#888">${e.t}</span><span>${e.x}</span></div>`).join('');}
rf();setInterval(()=>{fd=[ev[Math.floor(Math.random()*ev.length)],...fd.slice(0,7)];rf();},4000);
</script>
