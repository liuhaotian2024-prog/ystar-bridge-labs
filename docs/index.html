<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#scene{flex:1;position:relative;cursor:pointer}
canvas{display:block}

/* Header */
.hdr{background:rgba(10,10,20,.95);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a2e;z-index:10}
.hdr-title{font-size:1.1em;font-weight:700;letter-spacing:.04em}
.hdr-sub{font-size:.7em;color:#666}

/* Tooltip */
#tip{position:fixed;padding:6px 14px;background:rgba(26,122,76,.9);color:#fff;border-radius:6px;font-size:.75em;pointer-events:none;display:none;z-index:20;font-weight:600}

/* Speaker overlay */
.ov{position:fixed;inset:0;background:rgba(8,8,18,.92);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.ov.show{display:flex}
.sp-card{max-width:540px;width:92%;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.sp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sp-name{font-size:1.3em;font-weight:700}
.sp-role{font-size:.8em;color:#888;margin:2px 0 14px}
.sp-text{font-size:.92em;line-height:1.8;color:#ccc;min-height:90px;padding:16px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);margin-bottom:16px;white-space:pre-line}
.sp-btns{display:flex;gap:10px;justify-content:flex-end}
.sp-btns button{padding:8px 20px;border-radius:8px;font-size:.85em;cursor:pointer;border:none;transition:all .2s}
.btn-r{background:transparent;border:1px solid #444 !important;color:#aaa}.btn-r:hover{border-color:#888!important;color:#fff}
.btn-d{background:#1a7a4c;color:#fff}.btn-d:hover{background:#15603d}

/* Bottom */
.btm{background:rgba(10,10,20,.95);padding:8px 20px;border-top:1px solid #1a1a2e;z-index:10}
.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
.pill{padding:2px 10px;background:rgba(26,122,76,.1);border:1px solid rgba(26,122,76,.2);border-radius:12px;font-size:.7em;color:#1a7a4c;font-weight:600}
.links{text-align:center;font-size:.7em;color:#555}
.links a{color:#4a8adf;text-decoration:none;margin:0 8px}

/* Mobile */
@media(max-width:768px){.sp-card{padding:20px}.sp-text{font-size:.85em}}
</style>

<script type="module">
import * as THREE from 'three';

// === SCENE SETUP ===
const container = document.getElementById('scene');
const scene = new THREE.Scene();

renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

container.appendChild(renderer.domElement);

sunLight.shadow.camera.right = 8;
sunLight.shadow.camera.top = 8;
sunLight.shadow.camera.bottom = -8;
scene.add(sunLight);

const lampPositions = [[-2,4,-1],[1,4,0],[4,4,1]];
lampPositions.forEach(p => {

floor.position.y = -0.05;

[{c:0xffeb3b,x:-2,y:2.5},{c:0xff9800,x:-1.5,y:2.6},{c:0x4caf50,x:-2,y:2},{c:0x42a5f5,x:-1.2,y:2.1}].forEach(n=>{

// === FURNITURE HELPERS ===
function makeDesk(x,z,rot=0,standing=false){
  const g = new THREE.Group();
  const h = standing ? 1.1 : 0.75;
  const top = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.05,0.7), deskMat);
  top.position.y = h;
  top.castShadow = true;
  g.add(top);
  // Legs
  [[-0.6,-0.3],[0.6,-0.3],[-0.6,0.3],[0.6,0.3]].forEach(([lx,lz])=>{
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,h,6), legMat);
    leg.position.set(lx,h/2,lz);
    g.add(leg);
  });
  g.position.set(x,0,z);
  g.rotation.y = rot;
  scene.add(g);
  return g;
}
function makeMonitor(parent,ox=0,oz=0,w=0.5,h=0.35){
  const screen = new THREE.Mesh(new THREE.BoxGeometry(w,h,0.02), screenOnMat);
  screen.position.set(ox, parent.children[0].position.y + h/2 + 0.05, oz);
  screen.castShadow = true;
  parent.add(screen);
  // Stand
  const stand = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.03,0.15,6), legMat);
  stand.position.set(ox, parent.children[0].position.y + 0.075, oz);
  parent.add(stand);
  return screen;
}
function makeChair(x,z,rot=0){
  const g = new THREE.Group();
  // Seat
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.05,0.5), chairMat);
  seat.position.y = 0.45;
  g.add(seat);
  // Back
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.05), chairMat);
  back.position.set(0,0.7,-0.22);
  g.add(back);
  // Legs
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.45,6), legMat);
  base.position.y = 0.225;
  g.add(base);
  g.position.set(x,0,z);
  g.rotation.y = rot;
  scene.add(g);
  return g;
}
function makePerson(x,y,z,color,sitting=true){
  const g = new THREE.Group();
  g.userData.baseY = y;
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.15,12,12), skinMat);
  head.position.y = sitting ? 1.15 : 1.55;
  head.castShadow = true;
  g.add(head);
  // Body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,0.45,8), new THREE.MeshStandardMaterial({color,roughness:0.7}));
  body.position.y = sitting ? 0.85 : 1.25;
  body.castShadow = true;
  g.add(body);
  // Hair
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.16,12,12,0,Math.PI*2,0,Math.PI/2), new THREE.MeshStandardMaterial({color:0x1a1a2e}));
  hair.position.y = head.position.y + 0.02;
  g.add(hair);
  g.position.set(x,0,z);
  scene.add(g);
  return g;
}
function makePlant(x,z,scale=1){
  const g = new THREE.Group();
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.1,0.2,8), potMat);
  pot.position.y = 0.1;
  g.add(pot);
  // Leaves (3 spheres)
  [0,0.12,-0.08].forEach((dy,i)=>{
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.15+i*0.02,8,8), plantMat);
    leaf.position.set(Math.sin(i*2)*0.05, 0.35+dy, Math.cos(i*2)*0.05);
    g.add(leaf);
  });
  g.position.set(x,0,z);
  g.scale.setScalar(scale);
  scene.add(g);
}
function makeCoffeeBar(x,z){
  const g = new THREE.Group();
  const counter = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.9,0.5), new THREE.MeshStandardMaterial({color:0x5a4a3a,roughness:0.8}));

  counter.castShadow = true;
  g.add(counter);
  // Coffee machine
  const machine = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.35,0.2), new THREE.MeshStandardMaterial({color:0x444,metalness:0.7}));
  machine.position.set(-0.3,1.07,0);
  g.add(machine);
  // Red light
  const light = new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6), new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:2}));
  light.position.set(-0.3,1.15,0.11);
  g.add(light);
  g.position.set(x,0,z);
  scene.add(g);
}

cab.castShadow = true;

const csoDesk = makeDesk(-4.5, 1, Math.PI/3);

const sbBoard = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.03,0.15), new THREE.MeshStandardMaterial({color:0xcc4444}));

// === NAMEPLATES ===
// (Using small box + text sprite — Three.js text via canvas)
function makeNameplate(x, z, text, color=0xffffff){
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,0,256,64);
  ctx.strokeStyle = '#3a3a5a';
  ctx.strokeRect(1,1,254,62);
  ctx.fillStyle = '#ccc';
  ctx.font = '600 18px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true});
  const plate = new THREE.Mesh(new THREE.PlaneGeometry(0.6,0.15), mat);
  plate.position.set(x, 0.82, z);
  plate.rotation.x = -0.3;
  plate.lookAt(camera.position.x, 0.82, camera.position.z);
  scene.add(plate);
}
makeNameplate(3.5, 3.6, 'SECRETARY');
makeNameplate(4, 0.7, 'CEO · AIDEN');
makeNameplate(-1, 0.2, 'CTO');
makeNameplate(-3.5, -1.2, 'CMO · SOON');
makeNameplate(-4.5, 2.3, 'CSO · SOON');
makeNameplate(-3, -2.7, 'CFO · SOON');

// === INTERACTION ===
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tip = document.getElementById('tip');

// All person meshes for raycasting
const allPersons = [secPerson, ceoPerson, ctoPerson, cmoPerson, csoPerson, cfoPerson];
const allMeshes = [];
allPersons.forEach(p => p.traverse(c => { if(c.isMesh) { c.userData = {...p.userData}; allMeshes.push(c); }}));

container.addEventListener('mousemove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  if(hits.length > 0 && hits[0].object.userData.label){
    tip.style.display = 'block';
    tip.style.left = e.clientX + 12 + 'px';
    tip.style.top = e.clientY + 12 + 'px';
    tip.textContent = hits[0].object.userData.label;
    tip.style.background = hits[0].object.userData.soon ? 'rgba(100,100,100,.9)' : 'rgba(26,122,76,.9)';
    renderer.domElement.style.cursor = hits[0].object.userData.soon ? 'default' : 'pointer';
  } else {
    tip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

container.addEventListener('click', (e) => {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  if(hits.length > 0 && hits[0].object.userData.role){
    speak(hits[0].object.userData.role);
  }
});

    text:"I'm the CTO. Let me show you what's under the hood.\nWe built gov-mcp — an open source governance server with 38 tools.\nEvery agent action goes through it. If it violates a rule, it's blocked and logged automatically.\n235 out of 235 tests pass. The system is deterministic.\nYou can install it today: pip install gov-mcp."},
};
let cur=null,tyIv=null;

function typeText(el,txt){el.textContent='';let i=0;if(tyIv)clearInterval(tyIv);tyIv=setInterval(()=>{if(i<txt.length){el.textContent+=txt[i];i++}else clearInterval(tyIv)},22);}
function say(txt,cfg){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt.replace(/\n/g,' '));u.rate=cfg.rate||1;u.pitch=cfg.pitch||1;u.lang='en-US';const v=speechSynthesis.getVoices();const p=v.find(x=>x.lang.startsWith('en')&&x.name.includes('Samantha'))||v.find(x=>x.lang.startsWith('en-US'))||v[0];if(p)u.voice=p;speechSynthesis.speak(u);}
window.speak = function(id){const a=agents[id];if(!a)return;cur=id;document.getElementById('sn').textContent=a.name;document.getElementById('sn').style.color=a.color;document.getElementById('dot').style.background=a.color;document.getElementById('sr').textContent=a.role;document.getElementById('ov').classList.add('show');typeText(document.getElementById('st'),a.text);say(a.text,a.sp);};
window.replay = function(){if(cur){const a=agents[cur];typeText(document.getElementById('st'),a.text);say(a.text,a.sp);}};
window.dismiss = function(){document.getElementById('ov').classList.remove('show');if(speechSynthesis)speechSynthesis.cancel();if(tyIv)clearInterval(tyIv);cur=null;};

// Auto-trigger Secretary
setTimeout(()=>speak('sec'), 3000);
if(speechSynthesis.getVoices().length===0) speechSynthesis.addEventListener('voiceschanged',()=>{});

// === ANIMATION ===
let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.005;
  // Gentle camera breathing
  camera.position.x = 8 + Math.sin(t*0.5) * 0.15;
  camera.position.y = 7 + Math.cos(t*0.3) * 0.1;
  camera.lookAt(0, 0.5, 0);
  // Person breathing
  allPersons.forEach((p,i) => {
    if(p.children[0]) p.children[0].position.y += Math.sin(t*2 + i) * 0.001;
  });
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
