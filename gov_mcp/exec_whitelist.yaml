# GOV MCP exec whitelist — controls which commands gov_exec may run.
# Loaded at server startup from --exec-whitelist or adjacent to server.py.

# Commands matching any prefix here are ALLOWED (after Y*gov contract check).
allowed_prefixes:
  - "git status"
  - "git log"
  - "git diff"
  - "git add"
  - "git commit"
  - "git push"
  - "git pull"
  - "git fetch"
  - "git branch"
  - "git checkout"
  - "git merge"
  - "git rebase"
  - "git stash"
  - "git clone"
  - "git tag"
  - "git remote"
  - "pytest"
  - "python -m pytest"
  - "python3 -m pytest"
  - "pip install"
  - "pip3 install"
  - "python -m pip install"
  - "python3 -m pip install"
  - "cp "
  - "mv "
  - "mkdir"
  - "make"
  - "ls"
  - "cat "
  - "head "
  - "tail "
  - "wc "
  - "echo "
  - "pwd"
  - "which "
  - "python --version"
  - "python3 --version"
  - "python3.11 -m pytest"
  - "python3.11 -m pip"
  - "python3.11 -c "
  - "ystar "

# Commands matching any pattern here are ALWAYS denied, regardless of whitelist.
# Checked BEFORE allowed_prefixes — deny takes priority.
always_deny:
  - "rm -rf /"
  - "rm -rf /*"
  - "git push --force"
  - "git push -f"
  - "sudo rm"
  - "sudo shutdown"
  - "sudo reboot"
  - ":(){ :|:& };:"
  - "mkfs"
  - "dd if="
  - "> /dev/"
  - "chmod -R 777 /"
  - "curl | sh"
  - "curl | bash"
  - "wget -O - | sh"
