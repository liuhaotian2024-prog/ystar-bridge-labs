# GOV MCP exec whitelist — Unix (macOS / Linux)
# Auto-loaded when platform is darwin or linux.

allowed_prefixes:
  # ── Git ──
  - "git status"
  - "git log"
  - "git diff"
  - "git add"
  - "git commit"
  - "git push"
  - "git pull"
  - "git fetch"
  - "git branch"
  - "git checkout"
  - "git merge"
  - "git rebase"
  - "git stash"
  - "git clone"
  - "git tag"
  - "git remote"
  - "git show"
  - "git rev-parse"
  - "git describe"

  # ── Testing ──
  - "pytest"
  - "python -m pytest"
  - "python3 -m pytest"
  - "python3.11 -m pytest"
  - "python3.12 -m pytest"
  - "python3.13 -m pytest"

  # ── Package management ──
  - "pip install"
  - "pip3 install"
  - "pip list"
  - "pip3 list"
  - "pip show"
  - "pip3 show"
  - "python -m pip"
  - "python3 -m pip"
  - "python3.11 -m pip"
  - "python3.12 -m pip"
  - "python3.13 -m pip"

  # ── Python execution ──
  - "python -c "
  - "python3 -c "
  - "python3.11 -c "
  - "python3.12 -c "
  - "python3.13 -c "
  - "python --version"
  - "python3 --version"

  # ── Text processing ──
  - "grep "
  - "grep -"
  - "egrep "
  - "fgrep "
  - "head "
  - "head -"
  - "tail "
  - "tail -"
  - "cat "
  - "wc "
  - "wc -"
  - "sort "
  - "sort -"
  - "uniq "
  - "uniq -"
  - "awk "
  - "sed "
  - "cut "
  - "tr "
  - "diff "
  - "comm "

  # ── File operations ──
  - "ls"
  - "find "
  - "find ."
  - "cp "
  - "mv "
  - "mkdir"
  - "touch "
  - "file "
  - "stat "
  - "du "
  - "df "
  - "tree "

  # ── System info ──
  - "pwd"
  - "which "
  - "echo "
  - "env"
  - "date"
  - "uname"
  - "whoami"
  - "hostname"
  - "uptime"

  # ── Build ──
  - "make"
  - "cargo "
  - "npm "
  - "node "
  - "go "

  # ── Y*gov ──
  - "ystar "

always_deny:
  - "rm -rf /"
  - "rm -rf /*"
  - "rm -rf ~"
  - "git push --force"
  - "git push -f"
  - "sudo rm"
  - "sudo shutdown"
  - "sudo reboot"
  - ":(){ :|:& };:"
  - "mkfs"
  - "dd if="
  - "> /dev/"
  - "chmod -R 777 /"
  - "curl | sh"
  - "curl | bash"
  - "wget -O - | sh"
  - "eval "
  - "exec "
