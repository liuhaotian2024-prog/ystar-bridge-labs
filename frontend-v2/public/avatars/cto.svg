<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- CTO robot with goggles -->
  <circle cx="60" cy="40" r="25" fill="#D0D8E0" stroke="#2a5599" stroke-width="2"/>
  <!-- Goggles strap -->
  <path d="M30 36 Q60 28 90 36" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Goggles -->
  <ellipse cx="47" cy="37" rx="12" ry="9" fill="#2a5599" stroke="#1a3a66" stroke-width="2"/>
  <ellipse cx="73" cy="37" rx="12" ry="9" fill="#2a5599" stroke="#1a3a66" stroke-width="2"/>
  <!-- Goggle lens glow -->
  <ellipse cx="47" cy="37" rx="6" ry="5" fill="#4a8adf" opacity="0.6"/>
  <ellipse cx="73" cy="37" rx="6" ry="5" fill="#4a8adf" opacity="0.6"/>
  <!-- Mouth (focused) -->
  <line x1="50" y1="52" x2="70" y2="52" stroke="#2a5599" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (workshop) -->
  <path d="M35 65 Q60 58 85 65 L90 110 H30 Z" fill="#3a5070" stroke="none"/>
  <!-- Wrench -->
  <line x1="22" y1="80" x2="38" y2="96" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <circle cx="20" cy="78" r="5" fill="none" stroke="#888" stroke-width="2"/>
  <!-- Circuit lines on body -->
  <line x1="50" y1="75" x2="50" y2="95" stroke="#4a8adf" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="70" x2="70" y2="100" stroke="#4a8adf" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="85" x2="75" y2="85" stroke="#4a8adf" stroke-width="1" opacity="0.5"/>
</svg>
